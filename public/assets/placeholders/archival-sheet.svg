<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Archival placeholder sheet</title>
  <desc id="desc">A neutral archival placeholder for collection items without final scan media.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#181613"/>
      <stop offset="50%" stop-color="#100f0c"/>
      <stop offset="100%" stop-color="#201d17"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect x="92" y="92" width="1016" height="1016" rx="30" fill="none" stroke="#7f7464" stroke-opacity="0.32"/>
  <rect x="164" y="196" width="872" height="2" fill="#948976" fill-opacity="0.24"/>
  <rect x="164" y="286" width="760" height="2" fill="#948976" fill-opacity="0.18"/>
  <rect x="164" y="376" width="806" height="2" fill="#948976" fill-opacity="0.15"/>
  <rect x="164" y="466" width="708" height="2" fill="#948976" fill-opacity="0.13"/>
  <rect x="164" y="556" width="832" height="2" fill="#948976" fill-opacity="0.14"/>
  <rect x="164" y="646" width="680" height="2" fill="#948976" fill-opacity="0.12"/>
  <rect x="164" y="736" width="778" height="2" fill="#948976" fill-opacity="0.14"/>
  <rect width="1200" height="1200" filter="url(#grain)" opacity="0.6"/>
</svg>
